<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Vercel Web Analytics -->
    <script>
      window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
    <title>Zee Legacy Perfumes</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Cormorant+Garamond:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
    <style>
      body,
      html {
        margin: 0;
        padding: 0;
        overflow-x: hidden;
        background-color: transparent;
      }
      #canvas-container {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100vh;
        z-index: 1;
        background: linear-gradient(135deg, #ffe6fa 0%, #e6f7ff 100%);
      }
      .scroll-section {
        height: 100vh;
        width: 100%;
        position: relative;
        pointer-events: none;
        z-index: 0;
      }
      .overlay-text {
        position: fixed;
        top: 50%;
        transform: translateY(-50%);
        font-family: "Playfair Display", serif;
        font-size: 3.5rem;
        color: #1a1a1a;
        opacity: 0;
        pointer-events: none;
        width: 35%;
        text-shadow: 0 2px 20px rgba(0, 0, 0, 0.1);
        line-height: 1.2;
        z-index: 2;
      }

      /* Alternating positions */
      #text1 {
        left: 10%;
        text-align: left;
      }
      #text2 {
        left: 10%;
        text-align: left;
      }
      #text3 {
        right: 10%;
        text-align: right;
      }
      #text4 {
        right: 10%;
        text-align: right;
      }
      #text5 {
        left: 10%;
        text-align: left;
      }
      .highlight {
        color: #d4af37;
        display: block;
        font-size: 4rem;
        margin-top: 10px;
      }
      .shop-btn-container {
        position: fixed;
        bottom: 15%;
        left: 50%;
        transform: translateX(-50%);
        opacity: 0;
        pointer-events: auto;
        z-index: 10;
      }
      .shop-btn {
        padding: 20px 60px;
        font-size: 1.2rem;
        background: transparent;
        color: #d4af37;
        border: 2px solid #d4af37;
        cursor: pointer;
        font-family: "Playfair Display", serif;
        text-decoration: none;
        transition: all 0.4s ease;
        letter-spacing: 2px;
        text-transform: uppercase;
        position: relative;
        overflow: hidden;
      }
      .shop-btn:hover {
        background: #d4af37;
        color: #fff;
        box-shadow: 0 5px 20px rgba(212, 175, 55, 0.3);
      }
      .brand-name {
        position: fixed;
        top: 15%;
        left: 50%;
        transform: translateX(-50%);
        font-family: "Playfair Display", serif;
        font-size: 5rem;
        color: #1a1a1a;
        opacity: 0;
        pointer-events: none;
        z-index: 10;
        letter-spacing: 5px;
        text-transform: uppercase;
        text-shadow: 0 2px 20px rgba(0, 0, 0, 0.1);
        /* Reset styles from external CSS that cause visibility issues */
        background: none;
        -webkit-background-clip: initial;
        -webkit-text-fill-color: initial;
        background-clip: initial;
      }

      /* Loading Screen */
      #loader {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, #ffe6fa 0%, #e6f7ff 100%);
        z-index: 9999;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        transition: opacity 0.5s;
      }
      .loader-text {
        font-family: "Playfair Display", serif;
        font-size: 1.5rem;
        margin-top: 20px;
        color: #d4af37;
        letter-spacing: 1px;
      }
      .scroll-indicator {
        position: fixed;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%);
        font-family: "Playfair Display", serif;
        font-size: 1rem;
        color: #1a1a1a;
        opacity: 1;
        z-index: 10;
        letter-spacing: 2px;
        text-transform: uppercase;
        animation: bounce 2s infinite;
        pointer-events: none;
      }
      @keyframes bounce {
        0%,
        20%,
        50%,
        80%,
        100% {
          transform: translateX(-50%) translateY(0);
        }
        40% {
          transform: translateX(-50%) translateY(-10px);
        }
        60% {
          transform: translateX(-50%) translateY(-5px);
        }
      }

      /* Responsive Styles */
      @media (max-width: 1024px) {
        .overlay-text {
          font-size: 2.8rem;
          width: 45%;
        }
        .highlight {
          font-size: 3.2rem;
        }
        .brand-name {
          font-size: 4rem;
        }
      }

      @media (max-width: 768px) {
        .overlay-text {
          font-size: 2rem;
          width: 80%;
          left: 50% !important;
          right: auto !important;
          transform: translateX(-50%) translateY(-50%);
          text-align: center !important;
          padding: 0 20px;
          box-sizing: border-box;
        }
        .highlight {
          font-size: 2.4rem;
        }
        .brand-name {
          font-size: 2.5rem;
          letter-spacing: 3px;
          width: 90%;
          text-align: center;
        }
        .shop-btn-container {
          width: 80%;
          left: 50%;
          transform: translateX(-50%);
        }
        .shop-btn {
          padding: 15px 40px;
          font-size: 1rem;
          display: block;
          text-align: center;
          white-space: nowrap;
        }
        .scroll-indicator {
          font-size: 0.85rem;
          bottom: 20px;
          width: 90%;
          text-align: center;
        }
        .loader-text {
          font-size: 1.2rem;
        }
      }

      @media (max-width: 480px) {
        .overlay-text {
          font-size: 1.6rem;
          width: 90%;
          padding: 0 15px;
        }
        .highlight {
          font-size: 1.9rem;
          margin-top: 8px;
        }
        .brand-name {
          font-size: 2rem;
          letter-spacing: 2px;
          top: 12%;
        }
        .shop-btn-container {
          width: 85%;
          bottom: 12%;
        }
        .shop-btn {
          padding: 14px 30px;
          font-size: 0.9rem;
          letter-spacing: 1.5px;
        }
        .scroll-indicator {
          font-size: 0.75rem;
          bottom: 15px;
        }
      }
    </style>
  </head>
  <body>
    <!-- Loading Screen -->
    <div id="loader">
      <div class="loader-text">Loading Experience...</div>
    </div>
    <!-- Scroll Indicator -->
    <div id="scrollIndicator" class="scroll-indicator">
      Scroll to Experience
    </div>

    <!-- Navbar Removed -->

    <div id="canvas-container"></div>

    <!-- Scroll Sections (Invisible triggers) -->
    <div class="scroll-section" id="section1"></div>
    <div class="scroll-section" id="section2"></div>
    <div class="scroll-section" id="section3"></div>
    <div class="scroll-section" id="section4"></div>
    <div class="scroll-section" id="section5"></div>
    <div class="scroll-section" id="section6"></div>

    <!-- Text Overlays -->
    <div class="overlay-text" id="text1">Experience True Luxury</div>

    <div class="overlay-text" id="text2">
      Many perfumes use harmful
      <span class="highlight">Chemical Fixatives</span>
    </div>

    <div class="overlay-text" id="text3">
      We are different.
      <span class="highlight">100% Chemical Free</span>
    </div>

    <div class="overlay-text" id="text4">
      Crafted from the finest
      <span class="highlight">Organic Oils</span>
    </div>

    <div class="overlay-text" id="text5">
      Pure Scent.
      <span class="highlight">Unmatched Quality.</span>
    </div>

    <!-- Brand Name -->
    <div id="brandName" class="brand-name">Zee Legacy</div>

    <!-- Shop Button -->
    <div class="shop-btn-container" id="shopBtnContainer">
      <a href="shop.html" class="shop-btn">Shop Now</a>
    </div>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/RGBELoader.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="js/3d-scene.js"></script>
  </body>
</html>
