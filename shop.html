<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shop - Zee Legacy Perfumes</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Cormorant+Garamond:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Cormorant Garamond", serif;
        background: linear-gradient(135deg, #ffe6fa 0%, #e6f7ff 100%);
        min-height: 100vh;
        color: #1a1a1a;
      }

      html {
        scrollbar-width: thin;
        scrollbar-color: #d4af37 #f9f6f0;
      }

      ::-webkit-scrollbar {
        width: 12px;
        height: 12px;
      }

      ::-webkit-scrollbar-track {
        background: #f9f6f0;
      }

      ::-webkit-scrollbar-thumb {
        background: linear-gradient(180deg, #f4c542 0%, #d4af37 100%);
        border-radius: 999px;
        border: 3px solid #f9f6f0;
      }

      ::-webkit-scrollbar-thumb:hover {
        background: linear-gradient(180deg, #e0b93f 0%, #b9902f 100%);
      }

      /* Navbar */
      .navbar {
        background: linear-gradient(
          135deg,
          rgba(255, 230, 250, 0.95) 0%,
          rgba(255, 255, 255, 0.95) 50%,
          rgba(230, 247, 255, 0.95) 100%
        );
        backdrop-filter: blur(15px);
        padding: 1rem 2rem;
        position: fixed;
        top: 0;
        width: 100%;
        z-index: 1000;
        box-shadow: 0 2px 20px rgba(212, 175, 55, 0.1);
        border-bottom: 1px solid rgba(212, 175, 55, 0.15);
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .brand-name {
        font-family: "Playfair Display", serif;
        font-size: 1.5rem;
        background: linear-gradient(
          135deg,
          #d4af37 0%,
          #f4c542 50%,
          #d4af37 100%
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        font-weight: 600;
        letter-spacing: 2px;
      }

      .nav-menu {
        display: flex;
        list-style: none;
        gap: 2rem;
        align-items: center;
      }

      .nav-menu a {
        color: #1a1a1a;
        text-decoration: none;
        font-weight: 500;
        transition: color 0.3s ease;
      }

      .nav-menu a:hover {
        color: #d4af37;
      }

      .cart-icon-wrapper {
        position: relative;
        cursor: pointer;
      }

      .cart-icon {
        width: 26px;
        height: 26px;
        fill: #1a1a1a;
        transition: fill 0.3s ease;
      }

      .cart-icon-wrapper:hover .cart-icon {
        fill: #d4af37;
      }

      #cart-count {
        background: #d4af37;
        color: #fff;
        width: 20px;
        height: 20px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.75rem;
        font-weight: bold;
        position: absolute;
        top: -8px;
        right: -8px;
      }

      /* Main Content */
      .main-content {
        padding-top: 80px;
      }

      /* Page Header */
      .page-header {
        text-align: center;
        padding: 60px 20px 50px;
        position: relative;
      }

      .page-header::before {
        content: "✦";
        display: block;
        color: #d4af37;
        font-size: 1.5rem;
        margin-bottom: 15px;
        opacity: 0.8;
      }

      .page-header h1 {
        font-family: "Playfair Display", serif;
        font-size: 3.5rem;
        color: #1a1a1a;
        margin-bottom: 15px;
        letter-spacing: 3px;
        text-transform: uppercase;
      }

      .page-header p {
        font-size: 1.4rem;
        color: #666;
        font-style: italic;
        letter-spacing: 2px;
      }

      .header-divider {
        width: 100px;
        height: 2px;
        background: linear-gradient(90deg, transparent, #d4af37, transparent);
        margin: 25px auto 0;
      }

      /* Products Grid */
      .products-container {
        max-width: 1400px;
        margin: 0 auto;
        padding: 0 30px 60px;
      }

      .collections-stack {
        display: block;
      }

      .products-grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 40px;
      }

      @media (max-width: 1280px) {
        .products-grid {
          grid-template-columns: repeat(3, minmax(0, 1fr));
        }
      }

      @media (max-width: 980px) {
        .products-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      .collection-block {
        margin-bottom: 55px;
      }

      .collection-title {
        font-family: "Playfair Display", serif;
        font-size: clamp(1.4rem, 2.1vw, 2.1rem);
        letter-spacing: 3px;
        text-transform: uppercase;
        color: #1a1a1a;
        margin-bottom: 24px;
        padding-bottom: 12px;
        border-bottom: 1px solid rgba(212, 175, 55, 0.35);
      }

      /* Product Card - Premium Design */
      .product-card {
        background: rgba(255, 255, 255, 0.95);
        border-radius: 0;
        overflow: hidden;
        box-shadow: 0 15px 50px rgba(0, 0, 0, 0.08);
        transition: all 0.5s cubic-bezier(0.25, 0.8, 0.25, 1);
        position: relative;
        border: 1px solid rgba(212, 175, 55, 0.15);
      }

      .product-card::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 3px;
        background: linear-gradient(90deg, #d4af37, #f4c542, #d4af37);
        transform: scaleX(0);
        transition: transform 0.5s ease;
      }

      .product-card:hover::before {
        transform: scaleX(1);
      }

      .product-card {
        display: flex;
        flex-direction: column;
      }

      .product-card:hover {
        transform: translateY(-12px);
        box-shadow: 0 30px 70px rgba(212, 175, 55, 0.2);
      }

      .product-image-wrapper {
        width: 100%;
        height: 320px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(180deg, #fefefe 0%, #f8f8f8 100%);
        padding: 30px;
        position: relative;
        overflow: hidden;
      }

      /* Image Gallery */
      .product-gallery {
        position: relative;
        width: 100%;
        height: 100%;
      }

      .gallery-image {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
        transition: opacity 0.4s ease;
      }

      .gallery-image.active {
        opacity: 1;
      }

      .gallery-dots {
        position: absolute;
        bottom: 15px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 8px;
        opacity: 0;
        transition: opacity 0.3s ease;
        z-index: 10;
      }

      .product-image-wrapper:hover .gallery-dots {
        opacity: 1;
      }

      .gallery-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: rgba(212, 175, 55, 0.3);
        border: 1px solid #d4af37;
        cursor: pointer;
        transition: all 0.3s ease;
      }

      .gallery-dot:hover {
        background: rgba(212, 175, 55, 0.5);
      }

      .gallery-dot.active {
        background: #d4af37;
        transform: scale(1.2);
      }

      /* Gallery Arrow Buttons */
      .gallery-arrow {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        width: 36px;
        height: 36px;
        background: rgba(255, 255, 255, 0.9);
        border: 1px solid rgba(212, 175, 55, 0.3);
        border-radius: 50%;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
        transition: all 0.3s ease;
        z-index: 10;
        font-size: 14px;
        color: #d4af37;
      }

      .gallery-arrow:hover {
        background: #d4af37;
        color: white;
        border-color: #d4af37;
      }

      .gallery-arrow-left {
        left: 10px;
      }

      .gallery-arrow-right {
        right: 10px;
      }

      .product-image-wrapper:hover .gallery-arrow {
        opacity: 1;
      }

      .product-image-wrapper::before {
        content: "";
        position: absolute;
        top: 15px;
        left: 15px;
        right: 15px;
        bottom: 15px;
        border: 1px solid rgba(212, 175, 55, 0.1);
        pointer-events: none;
        transition: all 0.5s ease;
      }

      .product-card:hover .product-image-wrapper::before {
        top: 10px;
        left: 10px;
        right: 10px;
        bottom: 10px;
        border-color: rgba(212, 175, 55, 0.3);
      }

      .product-badge {
        position: absolute;
        top: 20px;
        right: 20px;
        background: linear-gradient(135deg, #d4af37, #f4c542);
        color: white;
        padding: 6px 14px;
        font-size: 0.7rem;
        text-transform: uppercase;
        letter-spacing: 2px;
        font-weight: 600;
      }

      .product-image {
        max-width: 85%;
        max-height: 85%;
        object-fit: contain;
        transition: transform 0.7s cubic-bezier(0.25, 0.8, 0.25, 1);
        filter: drop-shadow(0 10px 30px rgba(0, 0, 0, 0.1));
      }

      .product-card:hover .product-image {
        transform: scale(1.05);
      }

      .product-details {
        padding: 35px 30px;
        text-align: center;
        position: relative;
        display: flex;
        flex-direction: column;
        flex-grow: 1;
      }

      .product-details::before {
        content: "";
        position: absolute;
        top: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 50px;
        height: 1px;
        background: #d4af37;
      }

      .product-category {
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 3px;
        color: #d4af37;
        margin-bottom: 10px;
        font-weight: 600;
      }

      .product-name {
        font-family: "Playfair Display", serif;
        font-size: 1.8rem;
        color: #1a1a1a;
        margin-bottom: 15px;
        letter-spacing: 1px;
      }

      .product-description {
        font-size: 1rem;
        color: #777;
        line-height: 1.7;
        margin-bottom: 20px;
      }

      .product-price-wrapper {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        margin-bottom: 25px;
      }

      .price-row {
        display: flex;
        align-items: center;
        gap: 15px;
      }

      .original-price {
        font-family: "Cormorant Garamond", serif;
        font-size: 1.1rem;
        color: #999;
        position: relative;
        font-weight: 500;
      }

      .original-price::after {
        content: "";
        position: absolute;
        left: -5%;
        top: 50%;
        width: 110%;
        height: 1.5px;
        background: linear-gradient(
          90deg,
          transparent,
          #c9302c,
          #c9302c,
          transparent
        );
        transform: rotate(-8deg);
      }

      .discount-badge {
        background: linear-gradient(135deg, #c9302c 0%, #e74c3c 100%);
        color: white;
        font-size: 0.7rem;
        padding: 4px 10px;
        border-radius: 20px;
        text-transform: uppercase;
        letter-spacing: 1px;
        font-weight: 600;
      }

      .price-label {
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 2px;
        color: #999;
      }

      .product-price {
        font-family: "Playfair Display", serif;
        font-size: 1.8rem;
        color: #d4af37;
        font-weight: 600;
      }

      .product-actions {
        display: flex;
        flex-direction: column;
        gap: 12px;
        margin-top: auto;
      }

      .btn {
        padding: 14px 28px;
        font-family: "Cormorant Garamond", serif;
        font-size: 1rem;
        font-weight: 600;
        border: none;
        cursor: pointer;
        text-decoration: none;
        text-align: center;
        text-transform: uppercase;
        letter-spacing: 2px;
        transition: all 0.4s ease;
        display: block;
        position: relative;
        overflow: hidden;
      }

      .btn-primary {
        background: linear-gradient(135deg, #d4af37 0%, #f4c542 100%);
        color: #fff;
        box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
      }

      .btn-primary::before {
        content: "";
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(
          90deg,
          transparent,
          rgba(255, 255, 255, 0.3),
          transparent
        );
        transition: left 0.5s ease;
      }

      .btn-primary:hover::before {
        left: 100%;
      }

      .btn-primary:hover {
        transform: translateY(-3px);
        box-shadow: 0 8px 25px rgba(212, 175, 55, 0.45);
      }

      .btn-secondary {
        background: transparent;
        color: #1a1a1a;
        border: 1px solid #1a1a1a;
      }

      .btn-secondary:hover {
        background: #1a1a1a;
        color: #d4af37;
      }

      /* Decorative Elements */
      .section-decorator {
        text-align: center;
        margin: 40px 0;
      }

      .section-decorator span {
        display: inline-block;
        width: 8px;
        height: 8px;
        background: #d4af37;
        transform: rotate(45deg);
        margin: 0 15px;
        opacity: 0.6;
      }

      /* Footer */
      .footer {
        background: linear-gradient(
          135deg,
          rgba(255, 230, 250, 0.95) 0%,
          rgba(255, 255, 255, 0.95) 50%,
          rgba(230, 247, 255, 0.95) 100%
        );
        backdrop-filter: blur(15px);
        padding: 40px 2rem;
        text-align: center;
        border-top: 1px solid rgba(212, 175, 55, 0.15);
        position: relative;
      }

      .footer::before {
        content: "✦ ✦ ✦";
        display: block;
        color: #d4af37;
        font-size: 0.8rem;
        letter-spacing: 10px;
        margin-bottom: 20px;
        opacity: 0.6;
      }

      .footer p {
        font-size: 1rem;
        color: #1a1a1a;
        letter-spacing: 1px;
      }

      /* Cart Modal Styles */
      .cart-modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.7);
        z-index: 2000;
        align-items: center;
        justify-content: center;
        backdrop-filter: blur(8px);
      }

      .cart-modal.active {
        display: flex;
      }

      .cart-modal-content {
        background: white;
        border-radius: 0;
        width: 90%;
        max-width: 550px;
        max-height: 85vh;
        overflow-y: auto;
        box-shadow: 0 30px 100px rgba(0, 0, 0, 0.4);
        animation: slideUp 0.5s cubic-bezier(0.25, 0.8, 0.25, 1);
        border: 1px solid rgba(212, 175, 55, 0.2);
      }

      @keyframes slideUp {
        from {
          transform: translateY(60px);
          opacity: 0;
        }
        to {
          transform: translateY(0);
          opacity: 1;
        }
      }

      .cart-header {
        padding: 30px;
        background: linear-gradient(135deg, #1a1a1a 0%, #333 100%);
        color: white;
        display: flex;
        justify-content: space-between;
        align-items: center;
        position: relative;
      }

      .cart-header::after {
        content: "";
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        height: 3px;
        background: linear-gradient(90deg, #d4af37, #f4c542, #d4af37);
      }

      .cart-header h2 {
        margin: 0;
        font-family: "Playfair Display", serif;
        font-size: 1.5rem;
        letter-spacing: 2px;
        text-transform: uppercase;
      }

      .close-btn {
        background: transparent;
        border: 1px solid rgba(255, 255, 255, 0.3);
        color: white;
        font-size: 1.5rem;
        cursor: pointer;
        width: 40px;
        height: 40px;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.3s ease;
      }

      .close-btn:hover {
        background: #d4af37;
        border-color: #d4af37;
      }

      .cart-items-container {
        padding: 25px;
        max-height: 40vh;
        overflow-y: auto;
      }

      .cart-item {
        display: flex;
        gap: 15px;
        padding: 20px;
        background: #fafafa;
        margin-bottom: 15px;
        align-items: center;
        border-left: 3px solid #d4af37;
        transition: all 0.3s ease;
      }

      .cart-item:hover {
        background: #f5f5f5;
        padding-left: 25px;
      }

      .cart-item-image {
        width: 70px;
        height: 70px;
        object-fit: contain;
        background: white;
        padding: 5px;
        border: 1px solid #eee;
      }

      .cart-item-details {
        flex: 1;
      }

      .cart-item-name {
        font-family: "Playfair Display", serif;
        font-size: 1.1rem;
        color: #1a1a1a;
        margin: 0 0 5px 0;
      }

      .cart-item-price {
        font-size: 0.95rem;
        color: #d4af37;
        font-weight: 600;
        margin: 0;
      }

      .cart-item-quantity {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .quantity-btn {
        width: 28px;
        height: 28px;
        border: 1px solid #d4af37;
        background: white;
        color: #d4af37;
        cursor: pointer;
        font-weight: bold;
        transition: all 0.3s ease;
      }

      .quantity-btn:hover {
        background: #d4af37;
        color: white;
      }

      .quantity-display {
        min-width: 25px;
        text-align: center;
        font-weight: 600;
      }

      .remove-btn {
        background: transparent;
        border: 1px solid #ff6b6b;
        color: #ff6b6b;
        padding: 6px 12px;
        cursor: pointer;
        font-size: 0.8rem;
        text-transform: uppercase;
        letter-spacing: 1px;
        transition: all 0.3s ease;
      }

      .remove-btn:hover {
        background: #ff6b6b;
        color: white;
      }

      .empty-cart {
        text-align: center;
        padding: 50px 20px;
      }

      .empty-cart-icon {
        font-size: 3.5rem;
        margin-bottom: 15px;
      }

      .empty-cart p {
        font-size: 1.2rem;
        color: #666;
        font-style: italic;
      }

      .cart-summary {
        padding: 20px 25px;
        border-top: 1px solid #eee;
        background: #fafafa;
      }

      .summary-row {
        display: flex;
        justify-content: space-between;
        font-size: 1rem;
        margin-bottom: 10px;
      }

      .summary-row.total {
        font-family: "Playfair Display", serif;
        font-size: 1.4rem;
        color: #1a1a1a;
        font-weight: 600;
        border-top: 2px solid #d4af37;
        padding-top: 15px;
        margin-top: 15px;
      }

      .summary-row.total span:last-child {
        color: #d4af37;
      }

      .cart-actions {
        padding: 20px 25px 25px;
        display: flex;
        gap: 12px;
      }

      .cart-action-btn {
        flex: 1;
        padding: 14px 20px;
        border: none;
        font-family: "Cormorant Garamond", serif;
        font-size: 0.95rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.4s ease;
        text-transform: uppercase;
        letter-spacing: 1px;
      }

      .btn-continue-shopping {
        background: transparent;
        color: #1a1a1a;
        border: 1px solid #1a1a1a;
      }

      .btn-continue-shopping:hover {
        background: #1a1a1a;
        color: white;
      }

      .btn-checkout {
        background: linear-gradient(135deg, #d4af37 0%, #f4c542 100%);
        color: white;
      }

      .btn-checkout:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 25px rgba(212, 175, 55, 0.4);
      }

      /* Responsive */
      @media (max-width: 768px) {
        .navbar {
          padding: 1rem;
        }

        .brand-name {
          font-size: 1.2rem;
        }

        .nav-menu {
          gap: 1rem;
        }

        .page-header h1 {
          font-size: 2.2rem;
        }

        .page-header p {
          font-size: 1.1rem;
        }

        .products-grid {
          grid-template-columns: 1fr;
          gap: 30px;
        }

        .product-image-wrapper {
          height: 280px;
        }

        .product-name {
          font-size: 1.5rem;
        }

        .cart-modal-content {
          width: 95%;
          max-height: 90vh;
        }

        .cart-item {
          flex-wrap: wrap;
        }
      }

      /* Lightbox Modal */
      .lightbox-modal {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.95);
        z-index: 2000;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
        visibility: hidden;
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      }

      .lightbox-modal.active {
        opacity: 1;
        visibility: visible;
      }

      .lightbox-content {
        position: relative;
        max-width: 90vw;
        max-height: 85vh;
        transform: scale(0.8);
        transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      }

      .lightbox-modal.active .lightbox-content {
        transform: scale(1);
      }

      .lightbox-image-container {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .lightbox-image {
        max-width: 80vw;
        max-height: 75vh;
        object-fit: contain;
        border-radius: 8px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        opacity: 0;
        transition: opacity 0.3s ease;
      }

      .lightbox-image.active {
        opacity: 1;
      }

      .lightbox-close {
        position: absolute;
        top: -50px;
        right: 0;
        width: 44px;
        height: 44px;
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(212, 175, 55, 0.3);
        border-radius: 50%;
        color: #d4af37;
        font-size: 24px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.3s ease;
      }

      .lightbox-close:hover {
        background: #d4af37;
        color: white;
      }

      .lightbox-arrow {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        width: 50px;
        height: 50px;
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(212, 175, 55, 0.3);
        border-radius: 50%;
        color: #d4af37;
        font-size: 20px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.3s ease;
        z-index: 10;
      }

      .lightbox-arrow:hover {
        background: #d4af37;
        color: white;
        transform: translateY(-50%) scale(1.1);
      }

      .lightbox-arrow-left {
        left: -80px;
      }

      .lightbox-arrow-right {
        right: -80px;
      }

      .lightbox-info {
        text-align: center;
        margin-top: 20px;
      }

      .lightbox-title {
        font-family: "Playfair Display", serif;
        font-size: 1.5rem;
        color: #d4af37;
        margin-bottom: 8px;
      }

      .lightbox-counter {
        font-size: 0.9rem;
        color: rgba(255, 255, 255, 0.6);
        letter-spacing: 2px;
      }

      .lightbox-dots {
        display: flex;
        justify-content: center;
        gap: 10px;
        margin-top: 15px;
      }

      .lightbox-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.3);
        border: 1px solid rgba(212, 175, 55, 0.5);
        cursor: pointer;
        transition: all 0.3s ease;
      }

      .lightbox-dot:hover {
        background: rgba(212, 175, 55, 0.5);
      }

      .lightbox-dot.active {
        background: #d4af37;
        transform: scale(1.2);
      }

      @media (max-width: 768px) {
        .lightbox-arrow-left {
          left: 10px;
        }

        .lightbox-arrow-right {
          right: 10px;
        }

        .lightbox-arrow {
          width: 40px;
          height: 40px;
          font-size: 16px;
          background: rgba(0, 0, 0, 0.5);
        }

        .lightbox-image {
          max-width: 95vw;
          max-height: 60vh;
        }
      }
    </style>
  </head>
  <body>
    <!-- Navbar -->
    <nav class="navbar">
      <span class="brand-name">Zee Legacy Perfumes</span>
      <ul class="nav-menu">
        <li><a href="index.html">Home</a></li>
        <li><a href="#products">Products</a></li>
        <li><a href="#contact">Contact</a></li>
        <li>
          <div class="cart-icon-wrapper" onclick="openCartModal()">
            <svg class="cart-icon" viewBox="0 0 24 24">
              <path
                d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.08-.14.12-.31.12-.48 0-.55-.45-1-1-1H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"
              />
            </svg>
            <span id="cart-count" style="display: none">0</span>
          </div>
        </li>
      </ul>
    </nav>

    <!-- Cart Modal -->
    <div class="cart-modal" id="cartModal">
      <div class="cart-modal-content">
        <div class="cart-header">
          <h2>Your Cart</h2>
          <button class="close-btn" onclick="closeCartModal()">&times;</button>
        </div>
        <div id="cartItemsContainer" class="cart-items-container"></div>
        <div id="cartSummary" class="cart-summary"></div>
        <div class="cart-actions">
          <button
            class="cart-action-btn btn-continue-shopping"
            onclick="closeCartModal()"
          >
            Continue Shopping
          </button>
          <button class="cart-action-btn btn-checkout" onclick="goToCheckout()">
            Proceed to Order
          </button>
        </div>
      </div>
    </div>

    <!-- Lightbox Modal -->
    <div class="lightbox-modal" id="lightboxModal">
      <div class="lightbox-content">
        <button class="lightbox-close" onclick="closeLightbox()">
          &times;
        </button>
        <button
          class="lightbox-arrow lightbox-arrow-left"
          onclick="navigateLightbox(-1)"
        >
          ❮
        </button>
        <div class="lightbox-image-container">
          <img src="" alt="" class="lightbox-image active" id="lightboxImage" />
        </div>
        <button
          class="lightbox-arrow lightbox-arrow-right"
          onclick="navigateLightbox(1)"
        >
          ❯
        </button>
        <div class="lightbox-info">
          <h3 class="lightbox-title" id="lightboxTitle"></h3>
          <p class="lightbox-counter" id="lightboxCounter"></p>
          <div class="lightbox-dots" id="lightboxDots"></div>
        </div>
      </div>
    </div>

    <!-- Main Content -->
    <main class="main-content">
      <!-- Page Header -->
      <header class="page-header">
        <h1>Our Collection</h1>
        <p>Discover your signature scent</p>
        <div class="header-divider"></div>
      </header>

      <!-- Products Grid -->
      <section class="products-container" id="products">
        <div class="collections-stack" id="productsGrid">
          <!-- Products will be dynamically loaded here -->
        </div>
      </section>

      <div class="section-decorator">
        <span></span><span></span><span></span>
      </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
      <p>&copy; 2025 Zee Legacy Perfumes. All rights reserved.</p>
    </footer>

    <script src="js/cart.js"></script>
    <script src="js/products.js"></script>

    <script>
      // Load products into grid
      function loadProducts() {
        const grid = document.getElementById("productsGrid");

        if (!grid) return;

        if (products.length === 0) {
          grid.innerHTML = `<p style="text-align: center; grid-column: 1/-1;">No products available yet</p>`;
          return;
        }

        const categories = ["Floral", "Oud", "Spicy", "Citrus", "Woody"];
        const collections = ["50 ml collection", "35 ml collection", "Ouds"];

        grid.innerHTML = collections
          .map((collectionName) => {
            const sectionProducts = products.filter(
              (product) => product.collection === collectionName,
            );

            if (sectionProducts.length === 0) {
              return "";
            }

            const cardsHtml = sectionProducts
              .map(
                (product, index) => `
            <div class="product-card">
              <div class="product-image-wrapper">
                <div class="product-gallery" data-product-id="${product.id}">
                  ${product.images
                    .map(
                      (img, imgIndex) => `
                    <div class="gallery-image ${
                      imgIndex === 0 ? "active" : ""
                    }" data-index="${imgIndex}" onclick="openLightbox(${
                      product.id
                    }, ${imgIndex})" style="cursor: pointer;">
                      <img src="${img}" alt="${
                        product.name
                      }" class="product-image">
                    </div>
                  `,
                    )
                    .join("")}
                  <button class="gallery-arrow gallery-arrow-left" onclick="navigateGallery(${
                    product.id
                  }, -1)">❮</button>
                  <button class="gallery-arrow gallery-arrow-right" onclick="navigateGallery(${
                    product.id
                  }, 1)">❯</button>
                  <div class="gallery-dots">
                    ${product.images
                      .map(
                        (_, imgIndex) => `
                      <button class="gallery-dot ${
                        imgIndex === 0 ? "active" : ""
                      }" 
                              data-index="${imgIndex}" 
                              onclick="changeGalleryImage(${
                                product.id
                              }, ${imgIndex})"></button>
                    `,
                      )
                      .join("")}
                  </div>
                </div>
              </div>
              <div class="product-details">
                <div class="product-category">${
                  categories[index % categories.length]
                } Fragrance</div>
                <h3 class="product-name">${product.name}</h3>
                <p class="product-description">${product.description}</p>
                <div class="product-price-wrapper">
                  <div class="price-row">
                    <span class="original-price">${product.originalPrice}</span>
                    <span class="discount-badge">Sale</span>
                  </div>
                  <span class="product-price">${product.price}</span>
                </div>
                <div class="product-actions">
                  <button onclick="addToCart(${
                    product.id
                  })" class="btn btn-primary">Add to Cart</button>
                  <a href="${createWhatsAppLink(
                    product.name,
                  )}" target="_blank" class="btn btn-secondary">Order via WhatsApp</a>
                </div>
              </div>
            </div>
          `,
              )
              .join("");

            return `
              <section class="collection-block">
                <h2 class="collection-title">${collectionName}</h2>
                <div class="products-grid">${cardsHtml}</div>
              </section>
            `;
          })
          .join("");
      }

      // Add to cart function
      function addToCart(productId) {
        const product = products.find((p) => p.id === productId);
        if (product) {
          const status = cart.addItem(product);
          updateCartIcon();

          // Show visual feedback
          const btn = event.target;
          const originalText = btn.textContent;
          btn.textContent = status === "added" ? "Added! ✓" : "Updated! ✓";
          btn.style.background = "#4caf50";

          setTimeout(() => {
            btn.textContent = "Add to Cart";
            btn.style.background = "";
          }, 1500);
        }
      }

      // Change gallery image function
      function changeGalleryImage(productId, imageIndex) {
        const gallery = document.querySelector(
          `.product-gallery[data-product-id="${productId}"]`,
        );
        if (!gallery) return;

        // Update active image
        gallery.querySelectorAll(".gallery-image").forEach((img, idx) => {
          img.classList.toggle("active", idx === imageIndex);
        });

        // Update active dot
        gallery.querySelectorAll(".gallery-dot").forEach((dot, idx) => {
          dot.classList.toggle("active", idx === imageIndex);
        });
      }

      // Navigate gallery with arrows
      function navigateGallery(productId, direction) {
        const gallery = document.querySelector(
          `.product-gallery[data-product-id="${productId}"]`,
        );
        if (!gallery) return;

        const images = gallery.querySelectorAll(".gallery-image");
        const totalImages = images.length;

        // Find current active index
        let currentIndex = 0;
        images.forEach((img, idx) => {
          if (img.classList.contains("active")) {
            currentIndex = idx;
          }
        });

        // Calculate new index with wrap-around
        let newIndex = currentIndex + direction;
        if (newIndex < 0) newIndex = totalImages - 1;
        if (newIndex >= totalImages) newIndex = 0;

        changeGalleryImage(productId, newIndex);
      }

      // Lightbox functionality
      let currentLightboxProduct = null;
      let currentLightboxIndex = 0;

      function openLightbox(productId, imageIndex) {
        const product = products.find((p) => p.id === productId);
        if (!product) return;

        currentLightboxProduct = product;
        currentLightboxIndex = imageIndex;

        const modal = document.getElementById("lightboxModal");
        const image = document.getElementById("lightboxImage");
        const title = document.getElementById("lightboxTitle");
        const counter = document.getElementById("lightboxCounter");
        const dotsContainer = document.getElementById("lightboxDots");

        // Set image and info
        image.src = product.images[imageIndex];
        image.alt = product.name;
        title.textContent = product.name;
        counter.textContent = `${imageIndex + 1} / ${product.images.length}`;

        // Create dots
        dotsContainer.innerHTML = product.images
          .map(
            (_, idx) =>
              `<button class="lightbox-dot ${
                idx === imageIndex ? "active" : ""
              }" onclick="goToLightboxImage(${idx})"></button>`,
          )
          .join("");

        // Show modal with animation
        modal.classList.add("active");
        document.body.style.overflow = "hidden";
      }

      function closeLightbox() {
        const modal = document.getElementById("lightboxModal");
        modal.classList.remove("active");
        document.body.style.overflow = "";
        currentLightboxProduct = null;
      }

      function navigateLightbox(direction) {
        if (!currentLightboxProduct) return;

        const totalImages = currentLightboxProduct.images.length;
        currentLightboxIndex += direction;

        // Wrap around
        if (currentLightboxIndex < 0) currentLightboxIndex = totalImages - 1;
        if (currentLightboxIndex >= totalImages) currentLightboxIndex = 0;

        updateLightboxImage();
      }

      function goToLightboxImage(index) {
        if (!currentLightboxProduct) return;
        currentLightboxIndex = index;
        updateLightboxImage();
      }

      function updateLightboxImage() {
        const image = document.getElementById("lightboxImage");
        const counter = document.getElementById("lightboxCounter");
        const dots = document.querySelectorAll(".lightbox-dot");

        // Fade out
        image.classList.remove("active");

        setTimeout(() => {
          image.src = currentLightboxProduct.images[currentLightboxIndex];
          counter.textContent = `${currentLightboxIndex + 1} / ${
            currentLightboxProduct.images.length
          }`;

          // Update dots
          dots.forEach((dot, idx) => {
            dot.classList.toggle("active", idx === currentLightboxIndex);
          });

          // Fade in
          image.classList.add("active");
        }, 150);
      }

      // Close lightbox on escape key
      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") closeLightbox();
        if (e.key === "ArrowLeft") navigateLightbox(-1);
        if (e.key === "ArrowRight") navigateLightbox(1);
      });

      // Close lightbox when clicking outside the image
      document
        .getElementById("lightboxModal")
        .addEventListener("click", (e) => {
          if (e.target.classList.contains("lightbox-modal")) {
            closeLightbox();
          }
        });

      // Create WhatsApp link
      function createWhatsAppLink(productName) {
        const phoneNumber = "923295460498";
        const message = encodeURIComponent(
          `Assalam o Alaikum! 👋\nMain aapki Zee Legacy website par perfumes dekh raha hoon. Mujhe apne liye ek perfume lena hai, ${productName}, thoda guide kar dein please — kaunsa best rahega aur order ka process kya hai?`,
        );
        return `https://wa.me/${phoneNumber}?text=${message}`;
      }

      // Cart modal functions
      function openCartModal() {
        const modal = document.getElementById("cartModal");
        modal.classList.add("active");
        renderCartModal();
      }

      function closeCartModal() {
        const modal = document.getElementById("cartModal");
        modal.classList.remove("active");
      }

      function renderCartModal() {
        const container = document.getElementById("cartItemsContainer");
        const summary = document.getElementById("cartSummary");

        if (cart.isEmpty()) {
          container.innerHTML = `
            <div class="empty-cart">
              <div class="empty-cart-icon">🛍️</div>
              <p>Your cart is empty</p>
            </div>
          `;
          summary.innerHTML = "";
          return;
        }

        const items = cart.getItems();
        container.innerHTML = items
          .map(
            (item) => `
            <div class="cart-item">
              <img src="${item.image}" alt="${
                item.name
              }" class="cart-item-image">
              <div class="cart-item-details">
                <h3 class="cart-item-name">${item.name}</h3>
                <p class="cart-item-price">${item.price}</p>
              </div>
              <div class="cart-item-quantity">
                <button class="quantity-btn" onclick="updateCartQuantity(${
                  item.id
                }, ${item.quantity - 1})">−</button>
                <span class="quantity-display">${item.quantity}</span>
                <button class="quantity-btn" onclick="updateCartQuantity(${
                  item.id
                }, ${item.quantity + 1})">+</button>
              </div>
              <button class="remove-btn" onclick="removeFromCart(${
                item.id
              })">Remove</button>
            </div>
          `,
          )
          .join("");

        const total = cart.getTotal();
        summary.innerHTML = `
          <div class="summary-row">
            <span>Subtotal:</span>
            <span>${formatPrice(total.toString())}</span>
          </div>
          <div class="summary-row">
            <span>Delivery:</span>
            <span>To be calculated</span>
          </div>
          <div class="summary-row total">
            <span>Total:</span>
            <span>${formatPrice(total.toString())}</span>
          </div>
        `;
      }

      function updateCartQuantity(productId, newQuantity) {
        cart.updateQuantity(productId, newQuantity);
        updateCartIcon();
        renderCartModal();
      }

      function removeFromCart(productId) {
        cart.removeItem(productId);
        updateCartIcon();
        renderCartModal();
      }

      function goToCheckout() {
        closeCartModal();
        window.location.href = "order.html";
      }

      // Initialize
      document.addEventListener("DOMContentLoaded", function () {
        loadProducts();
        updateCartIcon();

        // Close modal when clicking outside
        const modal = document.getElementById("cartModal");
        modal.addEventListener("click", function (e) {
          if (e.target === modal) {
            closeCartModal();
          }
        });
      });
    </script>
  </body>
</html>
